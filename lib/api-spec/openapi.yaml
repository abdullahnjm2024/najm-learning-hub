openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Najm Educational System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: lessons
    description: Video lessons
  - name: exams
    description: Exams and Google Form embeds
  - name: exam-attempts
    description: Exam attempt submissions and scoring
  - name: leaderboard
    description: Leaderboard and rankings
  - name: notifications
    description: Push notifications
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: gradeLevel
          in: query
          schema:
            type: string
        - name: accessRole
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{studentId}:
    get:
      operationId: getUserByStudentId
      tags: [users]
      summary: Get user by student ID (admin only)
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{studentId}/access:
    patch:
      operationId: updateUserAccess
      tags: [users]
      summary: Toggle user access role (admin only)
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccessBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{studentId}/stars:
    patch:
      operationId: updateUserStars
      tags: [users]
      summary: Update user stars balance (admin only)
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStarsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /lessons:
    get:
      operationId: listLessons
      tags: [lessons]
      summary: List lessons (filtered by grade level)
      parameters:
        - name: gradeLevel
          in: query
          schema:
            type: string
        - name: accessLevel
          in: query
          schema:
            type: string
        - name: section
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"
    post:
      operationId: createLesson
      tags: [lessons]
      summary: Create a new lesson (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonBody"
      responses:
        "201":
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a lesson by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
    put:
      operationId: updateLesson
      tags: [lessons]
      summary: Update a lesson (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonBody"
      responses:
        "200":
          description: Updated lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
    delete:
      operationId: deleteLesson
      tags: [lessons]
      summary: Delete a lesson (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /exams:
    get:
      operationId: listExams
      tags: [exams]
      summary: List exams (filtered by grade level)
      parameters:
        - name: gradeLevel
          in: query
          schema:
            type: string
        - name: accessLevel
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exam"
    post:
      operationId: createExam
      tags: [exams]
      summary: Create a new exam with Google Form URL (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "201":
          description: Exam created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"

  /exams/{id}:
    get:
      operationId: getExam
      tags: [exams]
      summary: Get an exam by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"
    delete:
      operationId: deleteExam
      tags: [exams]
      summary: Delete an exam (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /exam-attempts:
    post:
      operationId: submitExamAttempt
      tags: [exam-attempts]
      summary: Submit exam score (best score logic)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAttemptBody"
      responses:
        "200":
          description: Attempt recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamAttemptResult"

  /exam-attempts/my:
    get:
      operationId: listMyAttempts
      tags: [exam-attempts]
      summary: List current user's exam attempts
      responses:
        "200":
          description: My attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamAttempt"

  /exam-attempts/{examId}/best:
    get:
      operationId: getBestAttempt
      tags: [exam-attempts]
      summary: Get best attempt for a specific exam by current user
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Best attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamAttempt"
        "404":
          description: No attempt found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard with ranks
      parameters:
        - name: gradeLevel
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /leaderboard/my-rank:
    get:
      operationId: getMyRank
      tags: [leaderboard]
      summary: Get current user's rank and position
      responses:
        "200":
          description: My rank info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyRankResponse"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Create notification (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationBody"
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/grade-summary:
    get:
      operationId: getGradeSummary
      tags: [stats]
      summary: Get student counts per grade level
      responses:
        "200":
          description: Grade summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        phone:
          type: string
        gradeLevel:
          type: string
          enum: [grade9, baccalaureate, outcomes, steps1000, ielts]
      required:
        - email
        - password
        - fullName
        - phone
        - gradeLevel

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: string
        email:
          type: string
        fullName:
          type: string
        phone:
          type: string
        gradeLevel:
          type: string
          enum: [grade9, baccalaureate, outcomes, steps1000, ielts]
        accessRole:
          type: string
          enum: [free, paid, admin]
        starsBalance:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - email
        - fullName
        - phone
        - gradeLevel
        - accessRole
        - starsBalance
        - createdAt

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    UpdateAccessBody:
      type: object
      properties:
        accessRole:
          type: string
          enum: [free, paid, admin]
      required:
        - accessRole

    UpdateStarsBody:
      type: object
      properties:
        starsBalance:
          type: integer
      required:
        - starsBalance

    Lesson:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleAr:
          type: string
        description:
          type: string
        descriptionAr:
          type: string
        youtubeUrl:
          type: string
        gradeLevel:
          type: string
          enum: [grade9, baccalaureate, outcomes, steps1000, ielts]
        accessLevel:
          type: string
          enum: [free, paid]
        section:
          type: string
        orderIndex:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - titleAr
        - youtubeUrl
        - gradeLevel
        - accessLevel
        - orderIndex
        - createdAt

    CreateLessonBody:
      type: object
      properties:
        title:
          type: string
        titleAr:
          type: string
        description:
          type: string
        descriptionAr:
          type: string
        youtubeUrl:
          type: string
        gradeLevel:
          type: string
          enum: [grade9, baccalaureate, outcomes, steps1000, ielts]
        accessLevel:
          type: string
          enum: [free, paid]
        section:
          type: string
        orderIndex:
          type: integer
      required:
        - title
        - titleAr
        - youtubeUrl
        - gradeLevel
        - accessLevel
        - orderIndex

    Exam:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleAr:
          type: string
        description:
          type: string
        descriptionAr:
          type: string
        googleFormUrl:
          type: string
        gradeLevel:
          type: string
          enum: [grade9, baccalaureate, outcomes, steps1000, ielts]
        accessLevel:
          type: string
          enum: [free, paid]
        maxScore:
          type: integer
        starsReward:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - titleAr
        - googleFormUrl
        - gradeLevel
        - accessLevel
        - maxScore
        - starsReward
        - createdAt

    CreateExamBody:
      type: object
      properties:
        title:
          type: string
        titleAr:
          type: string
        description:
          type: string
        descriptionAr:
          type: string
        googleFormUrl:
          type: string
        gradeLevel:
          type: string
          enum: [grade9, baccalaureate, outcomes, steps1000, ielts]
        accessLevel:
          type: string
          enum: [free, paid]
        maxScore:
          type: integer
        starsReward:
          type: integer
      required:
        - title
        - titleAr
        - googleFormUrl
        - gradeLevel
        - accessLevel
        - maxScore
        - starsReward

    SubmitAttemptBody:
      type: object
      properties:
        examId:
          type: integer
        score:
          type: integer
        maxScore:
          type: integer
      required:
        - examId
        - score
        - maxScore

    ExamAttempt:
      type: object
      properties:
        id:
          type: integer
        examId:
          type: integer
        userId:
          type: integer
        score:
          type: integer
        maxScore:
          type: integer
        isBestScore:
          type: boolean
        starsEarned:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - examId
        - userId
        - score
        - maxScore
        - isBestScore
        - starsEarned
        - createdAt

    ExamAttemptResult:
      type: object
      properties:
        attempt:
          $ref: "#/components/schemas/ExamAttempt"
        isNewBestScore:
          type: boolean
        starsAwarded:
          type: integer
        message:
          type: string
      required:
        - attempt
        - isNewBestScore
        - starsAwarded

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        studentId:
          type: string
        fullName:
          type: string
        gradeLevel:
          type: string
        starsBalance:
          type: integer
        isCurrentUser:
          type: boolean
      required:
        - rank
        - studentId
        - fullName
        - gradeLevel
        - starsBalance
        - isCurrentUser

    LeaderboardResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        total:
          type: integer
      required:
        - entries
        - total

    MyRankResponse:
      type: object
      properties:
        rank:
          type: integer
        total:
          type: integer
        starsBalance:
          type: integer
        percentile:
          type: number
      required:
        - rank
        - total
        - starsBalance
        - percentile

    Notification:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleAr:
          type: string
        body:
          type: string
        bodyAr:
          type: string
        type:
          type: string
          enum: [new_lesson, new_exam, announcement, stars_update]
        gradeLevel:
          type: string
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - titleAr
        - body
        - bodyAr
        - type
        - isRead
        - createdAt

    CreateNotificationBody:
      type: object
      properties:
        title:
          type: string
        titleAr:
          type: string
        body:
          type: string
        bodyAr:
          type: string
        type:
          type: string
          enum: [new_lesson, new_exam, announcement, stars_update]
        gradeLevel:
          type: string
          nullable: true
      required:
        - title
        - titleAr
        - body
        - bodyAr
        - type

    DashboardStats:
      type: object
      properties:
        totalStudents:
          type: integer
        paidStudents:
          type: integer
        freeStudents:
          type: integer
        totalLessons:
          type: integer
        totalExams:
          type: integer
        totalAttempts:
          type: integer
        recentRegistrations:
          type: integer
      required:
        - totalStudents
        - paidStudents
        - freeStudents
        - totalLessons
        - totalExams
        - totalAttempts
        - recentRegistrations

    GradeSummary:
      type: object
      properties:
        gradeLevel:
          type: string
        count:
          type: integer
        paidCount:
          type: integer
      required:
        - gradeLevel
        - count
        - paidCount
