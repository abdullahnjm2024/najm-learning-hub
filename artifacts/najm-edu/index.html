<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>نظام نجم التعليمي | Najm Educational System</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1d2b49" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Najm" />
    <link rel="apple-touch-icon" href="/najm-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <script>
      console.log("INDEX.HTML LOADED AND INLINE SCRIPT EXECUTING");
      window.onerror = function(msg, url, line, col, err) {
        console.log("GLOBAL ERROR:", msg, "at", url, "line", line, "col", col, err ? err.stack : "");
        document.body.innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap;">GLOBAL ERROR: ' + msg + '\nat ' + url + ' line ' + line + '\n' + (err ? err.stack : '') + '</pre>';
      };
      window.addEventListener("unhandledrejection", function(e) {
        console.log("UNHANDLED PROMISE REJECTION:", e.reason);
        document.body.innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap;">UNHANDLED REJECTION: ' + e.reason + '</pre>';
      });
    </script>
    <link rel="icon" type="image/png" href="/najm-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
